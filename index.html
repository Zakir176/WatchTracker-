<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies & Anime Watchlist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .input-section {
            padding: 30px;
            border-bottom: 1px solid #eee;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .input-field {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .type-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .type-btn.active {
            background: #667eea;
            color: white;
        }

        .type-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
        }

        .add-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .filters {
            padding: 0 30px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .list-section {
            padding: 30px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
        }

        .todo-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .todo-item.completed {
            opacity: 0.7;
            background: #f8f9fa;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #888;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .todo-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .todo-meta {
            font-size: 12px;
            color: #888;
            display: flex;
            gap: 15px;
        }

        .type-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .type-movie {
            background: #ff6b6b;
            color: white;
        }

        .type-anime {
            background: #4ecdc4;
            color: white;
        }

        .type-series {
            background: #45b7d1;
            color: white;
        }

        .type-documentary {
            background: #96ceb4;
            color: white;
        }

        .delete-btn {
            padding: 8px 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 25px 30px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            font-size: 14px;
            border-top: 1px solid #e2e8f0;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            
            .input-field {
                min-width: 100%;
            }
            
            .filters {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 My Watchlist</h1>
            <p>Keep track of movies and anime you want to watch</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="titleInput" class="input-field" placeholder="Title (e.g., Spirited Away)" maxlength="100">
                <input type="text" id="yearInput" class="input-field" placeholder="Year (optional)" maxlength="4">
                <button class="add-btn" onclick="addItem()">Add to List</button>
            </div>
            
            <div class="type-selector">
                <button class="type-btn active" data-type="movie">🎬 Movie</button>
                <button class="type-btn" data-type="anime">🎌 Anime</button>
                <button class="type-btn" data-type="series">📺 Series</button>
                <button class="type-btn" data-type="documentary">🎥 Documentary</button>
            </div>
        </div>

        <div class="filters">
            <span style="font-weight: 500; color: #666;">Filter:</span>
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="movie">Movies</button>
            <button class="filter-btn" data-filter="anime">Anime</button>
            <button class="filter-btn" data-filter="series">Series</button>
            <button class="filter-btn" data-filter="documentary">Documentaries</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn" data-filter="pending">To Watch</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCount">0</div>
                <div>Total Items</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedCount">0</div>
                <div>Completed</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="pendingCount">0</div>
                <div>To Watch</div>
            </div>
        </div>

        <div class="list-section">
            <div id="todoList">
                <div class="empty-state">
                    <div style="font-size: 48px; margin-bottom: 15px;">📽️</div>
                    <h3>Your watchlist is empty</h3>
                    <p>Add some movies or anime you'd like to watch!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let todos = [];
        let currentFilter = 'all';
        let selectedType = 'movie';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            renderTodos();
        });

        function setupEventListeners() {
            // Type selector buttons
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedType = this.dataset.type;
                });
            });

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderTodos();
                });
            });

            // Enter key to add item
            document.getElementById('titleInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addItem();
                }
            });

            document.getElementById('yearInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addItem();
                }
            });
        }

        function addItem() {
            const title = document.getElementById('titleInput').value.trim();
            if (!title) {
                alert('Please enter a title!');
                return;
            }

            const year = document.getElementById('yearInput').value.trim();
            
            const newTodo = {
                id: Date.now(),
                title: title,
                year: year,
                type: selectedType,
                completed: false,
                addedDate: new Date().toLocaleDateString()
            };

            todos.push(newTodo);
            
            // Clear inputs
            document.getElementById('titleInput').value = '';
            document.getElementById('yearInput').value = '';
            
            renderTodos();
        }

        function toggleComplete(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                renderTodos();
            }
        }

        function deleteItem(id) {
            todos = todos.filter(t => t.id !== id);
            renderTodos();
        }

        function getFilteredTodos() {
            let filtered = todos;

            switch (currentFilter) {
                case 'movie':
                case 'anime':
                case 'series':
                case 'documentary':
                    filtered = todos.filter(t => t.type === currentFilter);
                    break;
                case 'completed':
                    filtered = todos.filter(t => t.completed);
                    break;
                case 'pending':
                    filtered = todos.filter(t => !t.completed);
                    break;
                default:
                    filtered = todos;
            }

            return filtered;
        }

        function renderTodos() {
            const todoList = document.getElementById('todoList');
            const filteredTodos = getFilteredTodos();

            if (filteredTodos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 15px;">📽️</div>
                        <h3>${currentFilter === 'all' ? 'Your watchlist is empty' : 'No items match your filter'}</h3>
                        <p>${currentFilter === 'all' ? 'Add some movies or anime you\'d like to watch!' : 'Try selecting a different filter'}</p>
                    </div>
                `;
            } else {
                todoList.innerHTML = filteredTodos.map(todo => `
                    <div class="todo-item ${todo.completed ? 'completed' : ''}">
                        <input type="checkbox" class="checkbox" 
                               ${todo.completed ? 'checked' : ''} 
                               onchange="toggleComplete(${todo.id})">
                        <div class="todo-content">
                            <div class="todo-text">${todo.title}</div>
                            <div class="todo-meta">
                                <span class="type-badge type-${todo.type}">${todo.type}</span>
                                ${todo.year ? `<span>📅 ${todo.year}</span>` : ''}
                                <span>➕ ${todo.addedDate}</span>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteItem(${todo.id})">Delete</button>
                    </div>
                `).join('');
            }

            updateStats();
        }

        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }
    </script>
</body>
</html>
